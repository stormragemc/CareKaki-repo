# Development overrides — use with:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Backend: mounts source code and enables uvicorn --reload (no rebuild needed on change).
# Frontend: run outside Docker with `npm run dev` for fast HMR.
services:
  backend:
    volumes:
      - ./backend:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
