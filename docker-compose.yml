# CareKaki — local full-stack run. Synthetic/demo data only; no real secrets required.
#   web      → http://localhost:3000  (Next.js)
#   backend  → http://localhost:8000  (FastAPI)
# Browser-side fetches target http://localhost:8000 directly, so the backend port is
# published to the host. The Guardian stub (POST /guardian/check) and health endpoint
# work without any API keys; the LLM/Telegram routes are no-ops unless keys are supplied.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carekaki-backend
    ports:
      - "8000:8000"
    # Optional keys (LLM/Telegram). Defaults keep the container booting with synthetic data.
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ICCP_BOT_TELEGRAM_TOKEN: ${ICCP_BOT_TELEGRAM_TOKEN:-}
      OPENFDA_API_TOKEN: ${OPENFDA_API_TOKEN:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
      ELEVENLABS_MODEL_ID: ${ELEVENLABS_MODEL_ID:-}

      # When set, the backend registers its Telegram webhooks against this public URL
      # on startup (e.g. the ngrok tunnel below). Leave blank for the keyless demo.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/',timeout=3).status==200 else sys.exit(1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: carekaki-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Public tunnel for Telegram webhooks. Only started with the "webhook" profile:
  #   docker compose --profile webhook up
  # Requires NGROK_AUTHTOKEN + a (reserved) NGROK_DOMAIN. The backend reads
  # PUBLIC_BASE_URL=https://${NGROK_DOMAIN} and registers both bot webhooks on boot.
  ngrok:
    image: ngrok/ngrok:latest
    container_name: carekaki-ngrok
    profiles: ["webhook"]
    command:
      - "http"
      - "backend:8000"
      - "--domain=${NGROK_DOMAIN}"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040" # local ngrok inspector (http://localhost:4040)
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
